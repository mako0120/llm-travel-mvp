name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs (00-12)
        run: |
          missing=0
          for f in 00_Mission 01_Core_Rules 02_Architecture 03_Development \
                   04_PowerPoint 05_Canva "06_Content_R&D" 07_AI_Education \
                   08_GitHub 09_Notion 10_Self_Improvement 11_Output_Format \
                   12_Project_Rules; do
            if [ ! -f "docs/${f}.md" ]; then
              echo "MISSING: docs/${f}.md"
              missing=1
            fi
          done
          exit $missing

      - name: git diff --check (whitespace / conflict markers)
        run: git diff --check $(git hash-object -t tree /dev/null) HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-pptx
        run: pip install python-pptx

      - name: verify_pptx self-test
        run: python scripts/verify_pptx.py --self-test
