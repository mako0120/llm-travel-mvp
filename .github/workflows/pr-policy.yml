name: PR Policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-policy:
    runs-on: ubuntu-latest
    steps:
      - name: ブランチ名・Issue参照・PR必須項目を検査
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const errors = [];

            // 1. ブランチ名検査
            // 許可: claude/ codex/ chatgpt/ (AI担当) + feature/ fix/ refactor/ chore/ docs/ hotfix/ (人間)
            const branch = pr.head.ref;
            const branchPattern = /^(claude|codex|chatgpt)\/[a-z0-9][a-z0-9._-]*$|^(feature|fix|refactor|chore|docs|hotfix)\/[a-z0-9][a-z0-9._-]*$/i;
            if (!branchPattern.test(branch)) {
              errors.push(
                `ブランチ名 "${branch}" が規約に合いません。` +
                `claude/ codex/ chatgpt/ feature/ fix/ refactor/ chore/ docs/ hotfix/ のいずれかで始めてください。` +
                `(例: claude/feature-12-ai-itinerary-form)`
              );
            }

            const body = pr.body || '';

            // 2. Issue参照検査(#番号 が本文に含まれること)
            if (!/#\d+/.test(body)) {
              errors.push('PR本文にIssue参照(例: Closes #12)がありません。すべてのPRはIssue起点にしてください。');
            }

            // 3. PR必須セクション検査
            const requiredSections = ['## Summary', '## Changes', '## Test', '## Risk', '## Preview URL', '## Notes'];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push(`PR本文に必須セクション "${section}" がありません。テンプレートに従ってください。`);
              }
            }

            if (errors.length > 0) {
              core.summary.addHeading('PR Policy 検査結果: ❌ 不合格');
              core.summary.addList(errors);
              await core.summary.write();
              core.setFailed(errors.join('\n'));
            } else {
              core.summary.addHeading('PR Policy 検査結果: ✅ 合格');
              core.summary.addRaw('ブランチ名・Issue参照・PR必須セクションすべてOKです。');
              await core.summary.write();
            }
