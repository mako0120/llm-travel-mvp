name: Claude Code Implementation

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: github.event.label.name == 'claude' && vars.CLAUDE_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Run no-AI preflight
        id: preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/claude-preflight.mjs

      - name: Explain preflight stop
        if: steps.preflight.outputs.allowed != 'true'
        uses: actions/github-script@v7
        env:
          PREFLIGHT_REASON: ${{ steps.preflight.outputs.reason }}
        with:
          script: |
            const marker = '<!-- claude-automation:preflight-stop -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const body = `${marker}\n## Claude実装を開始しませんでした\n\n${process.env.PREFLIGHT_REASON}\n\nIssue本文を修正してから \`claude\` ラベルを付け直してください。Claudeは呼び出されていないため、AI使用量は消費していません。`;
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Install Claude subprocess sandbox
        if: steps.preflight.outputs.allowed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap
          bwrap --version

      - name: Check for an existing Fable 5 runbook
        if: steps.preflight.outputs.allowed == 'true'
        id: fable-state
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const hasRunbook = comments.some(comment =>
              comment.body?.includes('## Fable 5 実装手順書')
            );
            core.setOutput('needs_runbook', hasRunbook ? 'false' : 'true');

      - name: Ask Fable 5 for an implementation runbook
        if: steps.preflight.outputs.allowed == 'true' && steps.fable-state.outputs.needs_runbook == 'true'
        uses: anthropics/claude-code-action@fffa3483bb78e47a0c02fdcb79109570f1e1a617 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: false
          prompt: |
            You are the senior architect for GitHub Issue
            #${{ github.event.issue.number }} in ${{ github.repository }}.

            Write a concise, execution-ready implementation runbook for Sonnet 4.6.
            Read the Issue, CLAUDE.md, AGENTS.md, and only the relevant repository
            files. Do not edit code, create a branch, commit, push, or create a PR.

            Post one Issue comment headed `## Fable 5 実装手順書` containing:
            - objective and non-goals
            - exact files likely to change
            - ordered implementation steps
            - edge cases and security constraints
            - exact test commands
            - completion checklist
            - stop conditions requiring human approval

            Keep the plan small enough for an MVP and avoid speculative refactors.
          claude_args: |
            --model claude-fable-5
            --max-turns 8
            --allowedTools "Read,Glob,Grep,Bash(git status:*),Bash(git diff:*),Bash(gh issue view:*),Bash(gh issue comment:*)"

      - name: Mark actual Fable 5 runbook complete
        if: steps.preflight.outputs.allowed == 'true'
        id: sonnet-gate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            if (!comments.some(comment => comment.body?.includes('## Fable 5 実装手順書'))) {
              core.setFailed('Fable 5 action finished without posting its required runbook.');
              return;
            }
            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: ['ai:fable-used']
            });
            try {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number, name: 'ai:fable-needed'
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100
            });
            const matchingPull = pulls.some(pr =>
              pr.body?.match(new RegExp(`(?:Closes|Fixes|Resolves)\\s+#${issue_number}\\b`, 'i')) ||
              pr.head.ref.startsWith(`claude/feature-${issue_number}-`) ||
              pr.head.ref.startsWith(`claude/issue-${issue_number}-`)
            );
            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner, repo, per_page: 100
            });
            const matchingBranch = branches.some(branch =>
              branch.name.startsWith(`claude/feature-${issue_number}-`) ||
              branch.name.startsWith(`claude/issue-${issue_number}-`)
            );
            const shouldRun = !matchingPull && !matchingBranch;
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

            const marker = '<!-- ai-handoff:claude-start-after-fable -->';
            const existing = comments.find(comment => comment.body?.includes(marker));
            const body = shouldRun
              ? `${marker}\n## Sonnet実装開始\n\nFable 5手順書を確認しました。同じ認証ワークフロー内でSonnet実装を開始します。前回失敗後の再実行では、この記録を更新して安全に再開します。`
              : `${marker}\n## Sonnet重複実行を停止\n\n対象IssueのClaudeブランチまたはPRが既に存在するため、新しいSonnet実装は開始しません。`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }

      - name: Run Sonnet implementation in the same authenticated workflow
        if: steps.preflight.outputs.allowed == 'true' && steps.sonnet-gate.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@fffa3483bb78e47a0c02fdcb79109570f1e1a617 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            Implement GitHub Issue #${{ github.event.issue.number }}.
            Read the full Issue, the latest `Fable 5 実装手順書`, CLAUDE.md,
            AGENTS.md, and only relevant repository files. Stay inside scope.
            Use the branch prepared by Claude Code Action. Run npm ci, lint,
            typecheck, build, and relevant tests. Commit, push, and create a
            Draft PR to main containing `Closes #${{ github.event.issue.number }}`.
            Never merge or deploy Production. Never expose secrets or change
            billing, authentication, databases, environment variables, or
            external-service settings without exact human approval.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 20
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git branch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(npm ci:*),Bash(npm run:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr create:*)"

  disabled-notice:
    if: github.event.label.name == 'claude' && vars.CLAUDE_AUTOMATION_ENABLED != 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Explain one-time setup
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- claude-automation:disabled -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            if (!comments.some(comment => comment.body?.includes(marker))) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `${marker}\nClaude Code自動実装は安全ゲートにより停止中です。管理者がGitHub Actions Secret \`CLAUDE_CODE_OAUTH_TOKEN\` とRepository variable \`CLAUDE_AUTOMATION_ENABLED=true\` を設定すると、このIssueの \`claude\` ラベルを付け直すことで自動実装が開始します。秘密情報をIssueやコメントへ貼らないでください。`
              });
            }
