name: Fable 5 PR Repair

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: fable-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    if: |
      github.event.label.name == 'ai:repair-needed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'claude/feature-') &&
      vars.CLAUDE_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"
    steps:
      - name: Check out the existing feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Repair with Fable 5
        uses: anthropics/claude-code-action@fffa3483bb78e47a0c02fdcb79109570f1e1a617 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            You are the primary implementation engineer for pull request
            #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            The automated review or verification loop found a failure.
            Take ownership of the repair and carry it through to verified completion.

            Required workflow:
            1. Read CLAUDE.md, AGENTS.md, the linked Issue, the PR description,
               review comments, and failing GitHub check logs.
            2. Identify the root cause before editing.
            3. Make the smallest complete fix on the already checked-out feature branch.
            4. Do not broaden the linked Issue scope or perform opportunistic refactors.
            5. Run npm ci, npm run lint, npm run typecheck, npm run build,
               and relevant tests. Fix failures that are caused by this PR.
            6. Commit and push the repair to the same feature branch.
            7. Update the PR with the root cause, changed files, and exact test results.
            8. Stop after the push. Codex performs the independent review and the
               safe auto-merge workflow decides whether the PR may merge.

            Never read, print, modify, or commit secrets, credentials, tokens,
            .env files, or API keys. Never change Production deployment, billing,
            authentication, databases, environment variables, or external-service
            settings. If one of those areas is required, add
            `human-approval-required`, explain why, and stop.
          claude_args: |
            --model claude-fable-5
            --max-turns 20
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(npm ci:*),Bash(npm run:*),Bash(gh issue view:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh run view:*)"

  disabled-notice:
    if: |
      github.event.label.name == 'ai:repair-needed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'claude/feature-') &&
      vars.CLAUDE_AUTOMATION_ENABLED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Record that Fable 5 automation is unavailable
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- fable-repair:disabled -->';
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...context.repo, issue_number, per_page: 100 }
            );
            if (!comments.some(comment => comment.body?.includes(marker))) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number,
                body: `${marker}\nFable 5の自動修正は現在停止中です。追加課金は行っていません。Claude CodeアプリでこのPRを開いて修正を続行してください。`
              });
            }
